<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} + ' — Nelson Car Quest'">Nelson Car Quest</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous"/>
    <style>
        body { background-color: #f8f9fa; }
        .site-banner img { width: 100%; height: auto; display: block; }
        .topbar { background: #fff; border-bottom: 1px solid #dee2e6; }
        .balance-display { font-size: 2rem; font-weight: bold; color: #198754; }
        .card { box-shadow: 0 1px 4px rgba(0,0,0,.08); }
        .table th { background: #e9ecef; }
    </style>
</head>
<body>

<div th:fragment="navbar">
    <!-- Full-width banner -->
    <div class="site-banner">
        <img th:src="@{/images/NelsonCarQuestBanner.png}" alt="Nelson Car Quest — Your Savings Adventure Begins!"/>
    </div>
    <!-- Slim user/logout bar -->
    <div class="topbar py-2 mb-4">
        <div class="container d-flex justify-content-end align-items-center gap-3">
            <span class="text-muted small" sec:authentication="name">User</span>
            <form th:action="@{/logout}" method="post" class="d-inline mb-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-sm btn-outline-secondary">Logout</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
