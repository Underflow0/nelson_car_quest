<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ledger')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container pb-5">
    <div class="d-flex align-items-center mb-3">
        <a href="/parent/dashboard" class="btn btn-outline-secondary btn-sm me-3">&larr; Back</a>
        <h3 class="mb-0">Ledger &mdash; <span th:text="${child.effectiveName}">Child</span></h3>
        <span class="ms-3 badge"
              th:classappend="${account.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
              th:text="${account.status}">ACTIVE</span>
    </div>

    <div class="mb-3">
        <span class="fs-5 fw-semibold">Current Balance:
            <span class="text-success" th:text="'$' + ${#numbers.formatDecimal(account.balance, 1, 2)}">$0.00</span>
        </span>
        &nbsp;&nbsp;
        <span class="text-muted">Annual Rate:
            <span th:text="${#numbers.formatDecimal(account.interestRateAnnual.multiply(new java.math.BigDecimal('100')), 1, 2)} + '%'">0%</span>
        </span>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Date / Time</th>
                        <th>Type</th>
                        <th class="text-end">Amount</th>
                        <th>Note</th>
                        <th class="text-end">Balance After</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${transactions.isEmpty()}">
                        <td colspan="5" class="text-center text-muted py-4">No transactions yet.</td>
                    </tr>
                    <tr th:each="tx : ${transactions}">
                        <td th:text="${#temporals.format(tx.createdAt, 'MMM d, yyyy h:mm a')}"></td>
                        <td>
                            <span class="badge text-bg-success" th:if="${tx.type.name() == 'DEPOSIT'}">Deposit</span>
                            <span class="badge text-bg-danger" th:if="${tx.type.name() == 'WITHDRAWAL'}">Withdrawal</span>
                            <span class="badge text-bg-primary" th:if="${tx.type.name() == 'INTEREST'}">Interest</span>
                        </td>
                        <td class="text-end" th:text="'$' + ${#numbers.formatDecimal(tx.amount, 1, 2)}"></td>
                        <td th:text="${tx.note}"></td>
                        <td class="text-end fw-semibold" th:text="'$' + ${#numbers.formatDecimal(tx.balanceAfter, 1, 2)}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
