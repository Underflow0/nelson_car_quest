<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('My Savings')}"></head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container pb-5">
    <div class="text-center my-4">
        <h2>Hello, <span th:text="${child.effectiveName}">Kid</span>!</h2>
        <p class="text-muted">Here's how your savings are doing:</p>
        <div class="balance-display my-3"
             th:text="'$' + ${#numbers.formatDecimal(account.balance, 1, 2)}">$0.00</div>
        <p class="text-muted">
            Annual Interest Rate:
            <strong th:text="${#numbers.formatDecimal(account.interestRateAnnual.multiply(new java.math.BigDecimal('100')), 1, 2)} + '%'">0%</strong>
        </p>
        <span class="badge"
              th:classappend="${account.status.name() == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
              th:text="${account.status.name() == 'ACTIVE'} ? 'Account Active' : 'Account Closed'">Active</span>
        <div class="mt-3">
            <button class="btn btn-outline-secondary btn-sm"
                    type="button"
                    data-bs-toggle="modal"
                    data-bs-target="#statementModal"
                    th:attr="data-statement-base-url=@{/child/accounts/{id}/statement(id=${account.id})}">Download Statement</button>
        </div>
    </div>

    <h5 class="mt-4 mb-2">Transaction History</h5>
    <div class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>Date / Time</th>
                        <th>Type</th>
                        <th class="text-end">Amount</th>
                        <th>Note</th>
                        <th class="text-end">Balance After</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:if="${transactions.isEmpty()}">
                        <td colspan="5" class="text-center text-muted py-4">No transactions yet.</td>
                    </tr>
                    <tr th:each="tx : ${transactions}">
                        <td th:text="${#temporals.format(tx.createdAt, 'MMM d, yyyy h:mm a')}"></td>
                        <td>
                            <span class="badge text-bg-success" th:if="${tx.type.name() == 'DEPOSIT'}">Deposit</span>
                            <span class="badge text-bg-danger" th:if="${tx.type.name() == 'WITHDRAWAL'}">Withdrawal</span>
                            <span class="badge text-bg-primary" th:if="${tx.type.name() == 'INTEREST'}">Interest</span>
                        </td>
                        <td class="text-end" th:text="'$' + ${#numbers.formatDecimal(tx.amount, 1, 2)}"></td>
                        <td th:text="${tx.note}"></td>
                        <td class="text-end fw-semibold" th:text="'$' + ${#numbers.formatDecimal(tx.balanceAfter, 1, 2)}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Statement Modal -->
<div class="modal fade" id="statementModal" tabindex="-1" aria-labelledby="statementModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="statementModalLabel">Download Statement</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-muted small mb-3">Select the date range to include in the PDF statement.</p>
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="stmtPeriod" id="stmt1m" value="1m">
                        <label class="form-check-label" for="stmt1m">Last 1 month</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="stmtPeriod" id="stmt3m" value="3m" checked>
                        <label class="form-check-label" for="stmt3m">Last 3 months <span class="badge bg-secondary ms-1">Default</span></label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="stmtPeriod" id="stmt6m" value="6m">
                        <label class="form-check-label" for="stmt6m">Last 6 months</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="stmtPeriod" id="stmt1y" value="1y">
                        <label class="form-check-label" for="stmt1y">Last 12 months</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="radio" name="stmtPeriod" id="stmtCustom" value="custom">
                        <label class="form-check-label" for="stmtCustom">Custom range</label>
                    </div>
                </div>
                <div id="customDateRange" class="row g-2" style="display:none">
                    <div class="col">
                        <label class="form-label">From</label>
                        <input type="date" id="stmtFrom" class="form-control form-control-sm">
                    </div>
                    <div class="col">
                        <label class="form-label">To</label>
                        <input type="date" id="stmtTo" class="form-control form-control-sm">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" id="downloadStmtBtn">Download PDF</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script>
    (function () {
        const modal = document.getElementById('statementModal');
        let stmtBaseUrl = null;

        modal.addEventListener('show.bs.modal', function (event) {
            stmtBaseUrl = event.relatedTarget.getAttribute('data-statement-base-url');
            document.getElementById('stmt3m').checked = true;
            document.getElementById('customDateRange').style.display = 'none';
        });

        document.querySelectorAll('input[name="stmtPeriod"]').forEach(function (radio) {
            radio.addEventListener('change', function () {
                document.getElementById('customDateRange').style.display =
                    this.value === 'custom' ? '' : 'none';
            });
        });

        document.getElementById('downloadStmtBtn').addEventListener('click', function () {
            const period = document.querySelector('input[name="stmtPeriod"]:checked').value;
            let url = stmtBaseUrl + '?period=' + period;

            if (period === 'custom') {
                const from = document.getElementById('stmtFrom').value;
                const to   = document.getElementById('stmtTo').value;
                if (!from || !to) {
                    alert('Please select both a start and end date.');
                    return;
                }
                if (from > to) {
                    alert('Start date must be on or before end date.');
                    return;
                }
                url += '&from=' + from + '&to=' + to;
            }

            window.location.href = url;
            bootstrap.Modal.getInstance(modal).hide();
        });
    })();
</script>
</body>
</html>
