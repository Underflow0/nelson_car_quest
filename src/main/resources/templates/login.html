<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body class="bg-light">

<!-- Full-width banner -->
<div class="site-banner">
    <img th:src="@{/images/NelsonCarQuestBanner.png}"
         alt="Nelson Car Quest — Your Savings Adventure Begins!"/>
</div>

<div class="d-flex justify-content-center py-5">
    <div style="width:100%; max-width:400px;">
        <div class="card">
            <div class="card-body p-4">
                <h5 class="card-title mb-3">Sign In</h5>

                <div th:if="${param.error}" class="alert alert-danger" role="alert">
                    Invalid username or password, or account locked.
                </div>
                <div th:if="${param.logout}" class="alert alert-success" role="alert">
                    You have been logged out.
                </div>

                <form th:action="@{/login}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username"
                               autocomplete="username" required autofocus/>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password"
                               autocomplete="current-password" required/>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Sign In</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
