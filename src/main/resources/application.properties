# Server
server.port=9090

# Derby embedded database
spring.datasource.url=jdbc:derby:./data/savingsdb;create=true
spring.datasource.driver-class-name=org.apache.derby.iapi.jdbc.AutoloadedDriver
spring.datasource.username=
spring.datasource.password=
spring.datasource.hikari.connection-test-query=VALUES 1

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Session timeout (30 minutes)
server.servlet.session.timeout=30m

# Bootstrap parent user
app.bootstrap.enabled=true
app.bootstrap.parent.username=admin
app.bootstrap.parent.password=changeit123
app.bootstrap.parent.displayName=Administrator

# Scheduling
spring.task.scheduling.pool.size=2

# Thymeleaf
spring.thymeleaf.cache=false
